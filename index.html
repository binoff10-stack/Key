<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhận Key</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:350px;
    background:#1f2937;
    border-radius:16px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

.title{
    color:#00e5ff;
    font-size:26px;
    margin-bottom:20px;
}

.text{
    color:#ffffff;
    font-size:18px;
    margin-bottom:25px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#00b248;
}
</style>
</head>

<body>

<div class="card">

    <div class="title">
        Nhận Key
    </div>

    <div class="text">
        Vui lòng bấm nút <b>Tiếp tục</b> để nhận key.
    </div>

    <button onclick="window.location.href='https://link4m.net/CnWZVf'">
        ➜ Tiếp tục
    </button>

</div>

</body>
</html>
